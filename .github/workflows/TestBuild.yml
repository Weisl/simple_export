name: Test Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          path: simple_export  # Checkout directly into a folder named "simple_export"

      - name: Read version from blender_manifest.toml
        id: version
        run: |
          manifest_version=$(grep '^version' simple_export/blender_manifest.toml | sed 's/version = "\(.*\)"/\1/')
          echo "manifest_version=$manifest_version" >> $GITHUB_OUTPUT

      - name: Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Zip addon
        run: |
          zip -r simple_export_v${{ steps.version.outputs.manifest_version }}_${{ steps.vars.outputs.short_sha }}.zip \
            simple_export \
            -x "simple_export/.git*" \
            -x "simple_export/.*/*" \
            -x "simple_export/tests/*" \
            -x "simple_export/venv/*"

      - name: Upload zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple_export_v${{ steps.version.outputs.manifest_version }}_${{ steps.vars.outputs.short_sha }}
          path: simple_export_v${{ steps.version.outputs.manifest_version }}_${{ steps.vars.outputs.short_sha }}.zip
          retention-days: 7