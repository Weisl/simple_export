name: Test Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          path: simple_export  # Checkout directly into a folder named "simple_export"

      - name: Read version from blender_manifest.toml
        id: version
        run: |
          manifest_version=$(grep '^version' simple_export/blender_manifest.toml | sed 's/version = "\(.*\)"/\1/')
          echo "manifest_version=$manifest_version" >> $GITHUB_OUTPUT

      - name: Set short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Prepare add-on folder
        run: |
          mkdir -p staging/simple_export
          rsync -a \
            --exclude='.git' \
            --exclude='.*' \
            --exclude='tests' \
            --exclude='venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            simple_export/ staging/simple_export/

      - name: Upload zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple_export_v${{ steps.version.outputs.manifest_version }}_${{ steps.vars.outputs.short_sha }}
          path: staging/
          retention-days: 7
